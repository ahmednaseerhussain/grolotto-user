version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: grolotto
      POSTGRES_USER: grolotto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grolotto"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://grolotto:${DB_PASSWORD:-changeme_in_production}@db:5432/grolotto
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MOONPAY_API_KEY: ${MOONPAY_API_KEY}
      MOONPAY_SECRET_KEY: ${MOONPAY_SECRET_KEY}
      MOONPAY_WEBHOOK_SECRET: ${MOONPAY_WEBHOOK_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "3000:3000"

volumes:
  pgdata:
